networks:
  backend-network:
    driver: bridge

services:
  # =================================================================
  #                   🧱 Infra / Shared Components
  # =================================================================
  kafka-1:
    image: confluentinc/cp-kafka:latest
    container_name: kafka-1
    restart: always
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: "broker,controller"
      KAFKA_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT"
      KAFKA_LISTENERS: "PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093"
      KAFKA_ADVERTISED_LISTENERS: "PLAINTEXT://kafka-1:9092"
      KAFKA_INTER_BROKER_LISTENER_NAME: "PLAINTEXT"
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@kafka-1:9093,2@kafka-2:9093,3@kafka-3:9093"
      CLUSTER_ID: "ciWo7IWazngRchmNCqG12w"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 3
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 3
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 2
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
    volumes:
      - kafka_1_data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - backend-network

  kafka-2:
    image: confluentinc/cp-kafka:latest
    container_name: kafka-2
    restart: always
    ports:
      - "9093:9092"
    environment:
      KAFKA_NODE_ID: 2
      KAFKA_PROCESS_ROLES: "broker,controller"
      KAFKA_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT"
      KAFKA_LISTENERS: "PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093"
      KAFKA_ADVERTISED_LISTENERS: "PLAINTEXT://kafka-2:9092"
      KAFKA_INTER_BROKER_LISTENER_NAME: "PLAINTEXT"
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@kafka-1:9093,2@kafka-2:9093,3@kafka-3:9093"
      CLUSTER_ID: "ciWo7IWazngRchmNCqG12w"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 3
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 3
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 2
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
    volumes:
      - kafka_2_data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - backend-network

  kafka-3:
    image: confluentinc/cp-kafka:latest
    container_name: kafka-3
    restart: always
    ports:
      - "9094:9092"
    environment:
      KAFKA_NODE_ID: 3
      KAFKA_PROCESS_ROLES: "broker,controller"
      KAFKA_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT"
      KAFKA_LISTENERS: "PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093"
      KAFKA_ADVERTISED_LISTENERS: "PLAINTEXT://kafka-3:9092"
      KAFKA_INTER_BROKER_LISTENER_NAME: "PLAINTEXT"
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@kafka-1:9093,2@kafka-2:9093,3@kafka-3:9093"
      CLUSTER_ID: "ciWo7IWazngRchmNCqG12w"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 3
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 3
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 2
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
    volumes:
      - kafka_3_data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - backend-network


  # ---------------------------------------------------------------
  #                 🔎 Kafka UI: Redpanda Console
  # ---------------------------------------------------------------
  redpanda-console:
    image: docker.redpanda.com/redpandadata/console:latest
    restart: always
    ports:
      - "8080:8080"
    environment:
      KAFKA_BROKERS: "kafka-1:9092,kafka-2:9092,kafka-3:9092"
    depends_on:
        - kafka-1
        - kafka-2
        - kafka-3
    networks:
      - backend-network

  kafdrop:
    image: obsidiandynamics/kafdrop
    restart: always
    ports:
      - "19000:9000"
    environment:
      KAFKA_BROKERCONNECT: "kafka-1:9092,kafka-2:9092,kafka-3:9092"
    depends_on:
        - kafka-1
        - kafka-2
        - kafka-3
    networks:
      - backend-network

  # ---------------------------------------------------------------
  #                 🔎 Cache
  # ---------------------------------------------------------------
  redis-cache:
    image: redis:7
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 3s
      timeout: 3s
      retries: 5
    networks:
      - backend-network

  # ---------------------------------------------------------------
  #          🔎 Metrics - 📊 Dashboard + Alerts 
  # ---------------------------------------------------------------
  prometheus:
    image: prom/prometheus
    restart: always
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus # volume
    depends_on:
      - user-service
      - media-service
    networks:
      - backend-network

  grafana:
    image: grafana/grafana-oss:latest
    restart: always
    ports:
      - "5000:3000"
    depends_on:
      - prometheus
      - loki
    volumes:
      - grafana_data:/var/lib/grafana
    networks:
      - backend-network

  # ---------------------------------------------------------------
  #                 📦 Logs Storage
  # ---------------------------------------------------------------
  loki:
    image: grafana/loki:2.9.8
    restart: always
    ports:
      - "3100:3100"
    command: -config.file=/etc/loki/local-config.yaml
    volumes:
      - loki_data:/loki
    networks:
      - backend-network

  # ---------------------------------------------------------------
  #                 📤 Logs Collector
  # ---------------------------------------------------------------
  promtail:
    image: grafana/promtail:2.9.8
    restart: always
    volumes:
      - /var/log:/var/log:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - ./monitoring/promtail-config.yml:/etc/promtail/config.yml:ro
      - ./monitoring/alert-rules.yml:/etc/prometheus/alert-rules.yml:ro
    command: -config.file=/etc/promtail/config.yml
    depends_on:
      - loki
    networks:
      - backend-network

  # =================================================================
  #                         🗄 Databases
  # =================================================================
  user-db:
    image: postgres:16
    restart: always
    env_file:
      - ./user-service/.env.db
    ports:
      - "5433:5432"
    volumes:
      - user_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - backend-network
  
  post-db:
    image: postgres:16
    restart: always
    env_file:
      - ./post-service/.env.db
    ports:
      - "5434:5432"
    volumes:
      - post_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 30s
      timeout: 30s
      retries: 5
      start_period: 30s
    networks:
      - backend-network

  chat-db:
    image: postgres:16
    restart: always
    env_file:
      - ./chat-service/.env.db
    ports:
      - "5435:5432"
    volumes:
      - chat_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 30s
      timeout: 30s
      retries: 5
      start_period: 30s
    networks:
      - backend-network

  social-graph-db:
    image: postgres:16
    restart: always
    env_file:
      - ./social-graph-service/.env.db
    ports:
      - "5436:5432"
    volumes:
      - social_graph_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 30s
      timeout: 30s
      retries: 5
      start_period: 30s
    networks:
      - backend-network

  # =================================================================
  #                       👤 Business Services
  # =================================================================
  user-service:
    build: 
      context: ./user-service
      args:
        DATABASE_URL: ${DATABASE_URL_USER}
    ports:
      - "4001:4001"
    depends_on:
      user-db:
        condition: service_healthy
      kafka-1:
        condition: service_healthy
      kafka-2:
        condition: service_healthy
      kafka-3:
        condition: service_healthy
      redis-cache:
        condition: service_healthy
    command: >
      sh -c "npx prisma migrate deploy && node dist/server.js"
    env_file:
      - ./user-service/.env.docker
    networks:
      - backend-network

  media-service:
    build: ./media-service
    ports:
      - "4002:4002"
    depends_on:
      kafka-1:
        condition: service_healthy
      kafka-2:
        condition: service_healthy
      kafka-3:
        condition: service_healthy
    command: >
      sh -c "node dist/server.js"
    env_file:
      - ./media-service/.env.docker
    networks:
      - backend-network

  post-service:
    build: 
      context: ./post-service
      args:
        DATABASE_URL: ${DATABASE_URL_POST}
    ports:
      - "4003:4003"
    depends_on:
      post-db:
        condition: service_healthy
      kafka-1:
        condition: service_healthy
      kafka-2:
        condition: service_healthy
      kafka-3:
        condition: service_healthy
      redis-cache:
        condition: service_healthy
    command: >
      sh -c "npx prisma migrate deploy && node dist/server.js"
    env_file:
      - ./post-service/.env.docker
    networks:
      - backend-network

  chat-service:
    build: 
      context: ./chat-service
      args:
        DATABASE_URL: ${DATABASE_URL_CHAT}
    ports:
      - "4004:4004"
    depends_on:
      chat-db:
       condition: service_healthy
      kafka-1:
        condition: service_healthy
      kafka-2:
        condition: service_healthy
      kafka-3:
        condition: service_healthy
      redis-cache:
        condition: service_healthy
    command: >
      sh -c "npx prisma migrate deploy && node dist/server.js"
    env_file:
      - ./chat-service/.env.docker
    networks:
      - backend-network

  social-graph-service:
    build: 
      context: ./social-graph-service
      args:
        DATABASE_URL: ${DATABASE_URL_SOCIAL_GRAPH}
    ports:
      - "4005:4005"
    depends_on:
      social-graph-db:
       condition: service_healthy
      kafka-1:
        condition: service_healthy
      kafka-2:
        condition: service_healthy
      kafka-3:
        condition: service_healthy
      redis-cache:
        condition: service_healthy
    command: >
      sh -c "npx prisma migrate deploy && node dist/server.js"
    env_file:
      - ./social-graph-service/.env.docker
    networks:
      - backend-network
   
  # =================================================================
  #                   🚪 API Gateways (routing-only)
  # =================================================================
  web-gateway:
    build: ./api-gateway/web-gateway
    ports:
      - "8088:8088"
    environment:
      PORT: 8088
      USER_SERVICE_URL: "http://user-service:4001"
      MEDIA_SERVICE_URL: "http://media-service:4002"
      POST_SERVICE_URL: "http://post-service:4003"
      CHAT_SERVICE_URL: "http://chat-service:4004"
      SOCIAL_GRAPH_SERVICE_URL: "http://social-graph-service:4005"
    depends_on:
      - user-service
      - media-service
      - post-service
      - chat-service
      - social-graph-service
    networks:
      - backend-network

  # =================================================================
  #                   🗄 Volumes
  # =================================================================
volumes:
  user_db_data:
    driver: local

  post_db_data:
    driver: local
  
  chat_db_data:
    driver: local
  
  social_graph_db_data:
    driver: local
  
  grafana_data:
    driver: local
  
  prometheus_data:

  loki_data:
    driver: local

  redis_data:
  
  kafka_1_data:
    driver: local
  
  kafka_2_data:
    driver: local
  
  kafka_3_data:
    driver: local