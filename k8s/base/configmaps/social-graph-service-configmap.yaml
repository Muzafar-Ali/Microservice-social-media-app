apiVersion: v1
kind: ConfigMap
metadata:
  name: social-graph-service-config
  namespace: social-media
data:
  NODE_ENV: "production"
  PORT: "4005"
  
  DB_HOST: "social-graph-db"
  DB_PORT: "5432"
  DB_USER: "postgres"
  DB_NAME: "social-graph-db"

  REDIS_URL: "redis://redis-cache:6379"
  KAFKA_BROKERS: "kafka-0.kafka-headless:9092"

  SERVICE_NAME: "social-graph-service"
  LOG_LEVEL: "warn"