apiVersion: apps/v1
kind: Deployment
metadata:
  name: media-service
  namespace: social-media
  labels:
    app.kubernetes.io/name: media-service
    app.kubernetes.io/component: application
  annotations:
    app.kubernetes.io/source-path: "media-service"
spec:
  replicas: 2
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app.kubernetes.io/name: media-service
      app.kubernetes.io/component: application
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        app.kubernetes.io/name: media-service
        app.kubernetes.io/component: application
    spec:
      terminationGracePeriodSeconds: 30
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: media-service
          image: social-media/media-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 4002
          envFrom:
            - configMapRef:
                name: media-service-config
            - secretRef:
                name: media-service-secret
          env:
            - name: PORT
              valueFrom:
                configMapKeyRef:
                  name: media-service-config
                  key: PORT
            - name: SERVICE_NAME
              valueFrom:
                configMapKeyRef:
                  name: media-service-config
                  key: SERVICE_NAME
          readinessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
          livenessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 45
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 6
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
            capabilities:
              drop:
                - ALL
