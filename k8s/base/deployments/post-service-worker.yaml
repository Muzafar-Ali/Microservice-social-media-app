apiVersion: apps/v1
kind: Deployment
metadata:
  name: post-service-worker
  namespace: social-media
  labels:
    app.kubernetes.io/name: post-service-worker
    app.kubernetes.io/component: worker
  annotations:
    app.kubernetes.io/source-path: "post-service"
spec:
  replicas: 1
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app.kubernetes.io/name: post-service-worker
      app.kubernetes.io/component: worker
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        app.kubernetes.io/name: post-service-worker
        app.kubernetes.io/component: worker
    spec:
      terminationGracePeriodSeconds: 30
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      initContainers:
        - name: wait-for-postgres
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z ${DB_HOST} 5432; do
                echo "waiting for postgres at ${DB_HOST}:5432";
                sleep 3;
              done
          env:
            - name: DB_HOST
              value: "post-db"
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
            capabilities:
              drop:
                - ALL
      containers:
        - name: post-service-worker
          image: social-media/post-service:latest
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: post-service-config
            - secretRef:
                name: post-service-secret
          env:
            - name: SERVICE_RUNTIME_ROLE
              value: "worker"
            - name: SERVICE_NAME
              value: "post-service-worker"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: post-service-secret
                  key: DATABASE_URL
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
            capabilities:
              drop:
                - ALL
