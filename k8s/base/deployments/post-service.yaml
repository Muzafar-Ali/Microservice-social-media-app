apiVersion: apps/v1
kind: Deployment
metadata:
  name: post-service
  namespace: social-media
  labels:
    app.kubernetes.io/name: post-service
    app.kubernetes.io/component: application
  annotations:
    app.kubernetes.io/source-path: "post-service"
spec:
  replicas: 2
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app.kubernetes.io/name: post-service
      app.kubernetes.io/component: application
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        app.kubernetes.io/name: post-service
        app.kubernetes.io/component: application
    spec:
      terminationGracePeriodSeconds: 30
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      initContainers:
        - name: wait-for-postgres
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z ${DB_HOST} 5432; do
                echo "waiting for postgres at ${DB_HOST}:5432";
                sleep 3;
              done
          env:
            - name: DB_HOST
              value: "post-db"
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
            capabilities:
              drop:
                - ALL
      containers:
        - name: post-service
          image: social-media/post-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 4003
          envFrom:
            - configMapRef:
                name: post-service-config
            - secretRef:
                name: post-service-secret
          env:
            - name: SERVICE_RUNTIME_ROLE
              value: "api"
            - name: PORT
              valueFrom:
                configMapKeyRef:
                  name: post-service-config
                  key: PORT
            - name: SERVICE_NAME
              valueFrom:
                configMapKeyRef:
                  name: post-service-config
                  key: SERVICE_NAME
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: post-service-secret
                  key: DATABASE_URL
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 45
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 6
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
            capabilities:
              drop:
                - ALL
