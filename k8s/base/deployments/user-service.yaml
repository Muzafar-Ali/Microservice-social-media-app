apiVersion: apps/v1
kind: Deployment
metadata:
  name: user-service
  namespace: social-media
  labels:
    app.kubernetes.io/name: user-service
    app.kubernetes.io/component: application
  annotations:
    app.kubernetes.io/source-path: "user-service"
spec:
  replicas: 2
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app.kubernetes.io/name: user-service
      app.kubernetes.io/component: application
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        app.kubernetes.io/name: user-service
        app.kubernetes.io/component: application
    spec:
      terminationGracePeriodSeconds: 30
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      initContainers:
        - name: wait-for-postgres
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z ${DB_HOST} 5432; do
                echo "waiting for postgres at ${DB_HOST}:5432";
                sleep 3;
              done
          env:
            - name: DB_HOST
              value: "user-db"
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
            capabilities:
              drop:
                - ALL
      containers:
        - name: user-service
          image: social-media/user-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 4001
          envFrom:
            - configMapRef:
                name: social-media-config
            - secretRef:
                name: social-media-secret
          env:
            - name: PORT
              value: "4001"
            - name: SERVICE_NAME
              value: "user-service"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: social-media-secret
                  key: USER_DATABASE_URL
            - name: DB_HOST
              valueFrom:
                configMapKeyRef:
                  name: social-media-config
                  key: USER_DB_HOST
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: social-media-secret
                  key: USER_POSTGRES_USER
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: social-media-secret
                  key: USER_POSTGRES_PASSWORD
            - name: DB_NAME
              valueFrom:
                secretKeyRef:
                  name: social-media-secret
                  key: USER_POSTGRES_DB
          readinessProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 45
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 6
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
            capabilities:
              drop:
                - ALL
