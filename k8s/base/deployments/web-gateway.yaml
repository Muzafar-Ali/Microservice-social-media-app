apiVersion: apps/v1
kind: Deployment
metadata:
  name: web-gateway
  namespace: social-media
  labels:
    app.kubernetes.io/name: web-gateway
    app.kubernetes.io/component: application
  annotations:
    app.kubernetes.io/source-path: "api-gateway/web-gateway"
spec:
  replicas: 2
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app.kubernetes.io/name: web-gateway
      app.kubernetes.io/component: application
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        app.kubernetes.io/name: web-gateway
        app.kubernetes.io/component: application
    spec:
      terminationGracePeriodSeconds: 30
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: web-gateway
          image: social-media/web-gateway:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8088
          envFrom:
            - configMapRef:
                name: social-media-config
            - secretRef:
                name: social-media-secret
          env:
            - name: PORT
              value: "8088"
            - name: SERVICE_NAME
              value: "web-gateway"
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 45
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 6
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
            capabilities:
              drop:
                - ALL
