apiVersion: apps/v1
kind: Deployment
metadata:
  name: redpanda-console
  namespace: social-media
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redpanda-console
  template:
    metadata:
      labels:
        app: redpanda-console
    spec:
      containers:
        - name: redpanda-console
          image: docker.redpanda.com/redpandadata/console:latest
          ports:
            - containerPort: 8080
          env:
            - name: KAFKA_BROKERS
              value: "kafka:9092"
---
apiVersion: v1
kind: Service
metadata:
  name: redpanda-console
  namespace: social-media
spec:
  selector:
    app: redpanda-console
  ports:
    - port: 8080
      targetPort: 8080