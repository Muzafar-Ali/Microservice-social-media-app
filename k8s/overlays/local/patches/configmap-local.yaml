apiVersion: v1
kind: ConfigMap
metadata:
  name: user-service-config
  namespace: social-media
data:
  NODE_ENV: "production"
  APP_ENV: "local"
  LOG_LEVEL: "debug"
  REDIS_URL: "redis://redis-cache:6379"
  KAFKA_BROKERS: "kafka-0.kafka-headless:9092"

