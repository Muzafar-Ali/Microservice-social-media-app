global:
  scrape_interval: 15s
  scrape_timeout: 10s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alert-rules.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

scrape_configs:
  # All application/custom/exporter metrics are scraped by OTEL Collector first.
  # Prometheus stores them by scraping the Collector's Prometheus exporter.
  - job_name: "otel-collector-metrics"
    static_configs:
      - targets: ["otel-collector:9464"]
        labels:
          service: "otel-collector"

  # Collector internal health/performance metrics.
  - job_name: "otel-collector-internal"
    static_configs:
      - targets: ["otel-collector:8888"]
        labels:
          service: "otel-collector-internal"

  - job_name: "prometheus"
    static_configs:
      - targets: ["prometheus:9090"]
        labels:
          service: "prometheus"
