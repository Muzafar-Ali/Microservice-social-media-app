global:
  scrape_interval: 15s
  scrape_timeout: 10s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alert-rules.yml

scrape_configs:
  - job_name: "user-service"
    metrics_path: /metrics
    static_configs:
      - targets: ["user-service:4001"]
        labels:
          service: "user-service"

  - job_name: "post-service"
    metrics_path: /metrics
    static_configs:
      - targets: ["post-service:4003"]
        labels:
          service: "post-service"

  - job_name: "chat-service"
    metrics_path: /metrics
    static_configs:
      - targets: ["chat-service:4004"]
        labels:
          service: "chat-service"

  - job_name: "media-service"
    metrics_path: /metrics
    static_configs:
      - targets: ["media-service:4002"]
        labels:
          service: "media-service"

  - job_name: "social-graph-service"
    metrics_path: /metrics
    static_configs:
      - targets: ["social-graph-service:4005"]
        labels:
          service: "social-graph-service"